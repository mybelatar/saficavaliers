<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Safi Cavaliers | Hors ligne</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #4b2f1c 0%, #140f0b 50%, #0a0806 100%);
        color: #f8f5f1;
      }

      .card {
        width: min(92vw, 460px);
        border-radius: 18px;
        background: rgba(20, 15, 11, 0.78);
        border: 1px solid rgba(248, 245, 241, 0.16);
        padding: 24px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(248, 245, 241, 0.86);
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Application hors ligne</h1>
      <p>
        La connexion reseau est indisponible. Reconnectez-vous a Internet pour synchroniser les
        commandes et les donnees du dashboard.
      </p>
    </section>
  </body>
</html>
